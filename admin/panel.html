<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel — Crecer Felices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="panel-body">

  <!-- HEADER -->
  <header class="panel-header">
    <div class="panel-header-inner">
      <div class="panel-titulo">
        <strong>Crecer Felices</strong>
        <span>Panel de administración</span>
      </div>
      <button id="btnLogout" class="btn-logout">Cerrar sesión</button>
    </div>
  </header>

  <!-- TABS DE NAVEGACIÓN -->
  <nav class="panel-tabs" role="tablist">
    <button class="panel-tab-btn active" data-tab="testimonios" role="tab">Testimonios</button>
    <button class="panel-tab-btn" data-tab="aliados"     role="tab">Aliados</button>
    <button class="panel-tab-btn" data-tab="talleres"    role="tab">Talleres</button>
    <button class="panel-tab-btn" data-tab="eventos"     role="tab">Eventos</button>
  </nav>

  <!-- CONTENIDO -->
  <main class="panel-main">

    <section class="tab-panel active" id="tab-testimonios">
      <h2 class="seccion-titulo">Testimonios</h2>

      <!-- Formulario agregar / editar -->
      <div class="form-admin" id="tForm">
        <h3 id="tFormTitulo">Agregar testimonio</h3>

        <div class="field">
          <label for="tNombre">Nombre *</label>
          <input type="text" id="tNombre" placeholder="Ej: María G.">
        </div>

        <div class="field">
          <label for="tRol">Rol / descripción</label>
          <input type="text" id="tRol" placeholder="Ej: Voluntaria en Mi Solcito · 2 años">
        </div>

        <div class="field">
          <label for="tTexto">Texto del testimonio *</label>
          <textarea id="tTexto" rows="4" placeholder="Lo que dice esta persona sobre el proyecto…"></textarea>
        </div>

        <div class="field">
          <label for="tFoto">Foto (opcional)</label>
          <input type="file" id="tFoto" accept="image/*">
          <img id="tFotoPreview" style="display:none;width:70px;height:70px;border-radius:50%;object-fit:cover;margin-top:10px;border:2px solid var(--gris-borde);" alt="Preview">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:end;">
          <div class="field">
            <label for="tOrden">Orden (menor = primero)</label>
            <input type="number" id="tOrden" value="0" min="0">
          </div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--texto-suave);padding-bottom:12px;">
            <input type="checkbox" id="tActivo" checked style="width:auto;accent-color:var(--fucsia);"> Visible en el sitio
          </label>
        </div>

        <p id="tMsg" style="display:none;"></p>

        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button id="tBtnGuardar"  class="btn-primario">Guardar</button>
          <button id="tBtnCancelar" class="btn-secundario" style="display:none;">Cancelar edición</button>
        </div>
      </div>

      <!-- Lista de testimonios guardados -->
      <h3 class="seccion-titulo">Testimonios guardados</h3>
      <div id="tLista" class="lista-items"></div>
    </section>

    <section class="tab-panel" id="tab-aliados">
      <h2 class="seccion-titulo">Aliados — Quienes nos acompañan</h2>

      <!-- Formulario agregar / editar -->
      <div class="form-admin" id="aForm">
        <h3 id="aFormTitulo">Agregar aliado</h3>

        <div class="field">
          <label for="aNombre">Nombre *</label>
          <input type="text" id="aNombre" placeholder="Ej: Oscar David Mayorista">
        </div>

        <div class="field">
          <label for="aLink">Link (web o Instagram, opcional)</label>
          <input type="url" id="aLink" placeholder="https://...">
        </div>

        <div class="field">
          <label for="aLogo">Logo (imagen)</label>
          <input type="file" id="aLogo" accept="image/*">
          <img id="aLogoPreview" style="display:none;max-width:160px;max-height:80px;object-fit:contain;margin-top:10px;border:1.5px solid var(--gris-borde);border-radius:8px;padding:6px;background:#fff;" alt="Preview">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:end;">
          <div class="field">
            <label for="aOrden">Orden (menor = primero)</label>
            <input type="number" id="aOrden" value="0" min="0">
          </div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--texto-suave);padding-bottom:12px;">
            <input type="checkbox" id="aActivo" checked style="width:auto;accent-color:var(--fucsia);"> Visible en el sitio
          </label>
        </div>

        <p id="aMsg" style="display:none;"></p>

        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button id="aBtnGuardar"  class="btn-primario">Guardar</button>
          <button id="aBtnCancelar" class="btn-secundario" style="display:none;">Cancelar edición</button>
        </div>
      </div>

      <!-- Lista de aliados guardados -->
      <h3 class="seccion-titulo">Aliados guardados</h3>
      <div id="aLista" class="lista-items"></div>
    </section>

    <section class="tab-panel" id="tab-talleres">
      <p class="coming-soon">Sección <strong>Talleres</strong> — se implementa en el paso 5.</p>
    </section>

    <section class="tab-panel" id="tab-eventos">
      <p class="coming-soon">Sección <strong>Eventos</strong> — se implementa en el paso 6.</p>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin.js" defer></script>
  <script>
    // Protección de ruta: solo accesible con sesión activa
    db.auth.getSession().then(({ data: { session } }) => {
      if (!session) window.location.href = 'index.html';
    });

    // Cerrar sesión
    document.getElementById('btnLogout').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = 'index.html';
    });

    // Navegación entre tabs
    const tabBtns   = document.querySelectorAll('.panel-tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
